<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DemiEssence - Checkout Link Builder</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <!-- Header -->
            <header class="header">
                <div class="logo">
                    <h1>DemiEssence</h1>
                    <p>Checkout Link Builder</p>
                </div>
            </header>

            <!-- Authentication Section -->
            <section id="authSection" class="auth-section">
                <div class="auth-card">
                    <div class="lock-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <h2>Access Required</h2>
                    <p>Enter your password to continue</p>
                    <input 
                        type="password" 
                        id="accessPassword" 
                        class="input-field"
                        placeholder="Password"
                        autocomplete="current-password"
                    >
                    <button class="btn btn-primary" onclick="authenticate()">Unlock</button>
                </div>
            </section>

            <!-- Builder Form -->
            <section id="builderForm" class="builder-section hidden">
                <form id="orderForm" class="order-form">
                    <!-- Order Information -->
                    <div class="form-section">
                        <h3 class="section-title">Order Information</h3>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="orderId">Order ID</label>
                                <input 
                                    type="text" 
                                    id="orderId" 
                                    class="input-field"
                                    placeholder="DEM-DDMMTAG"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="customerName">Customer Name</label>
                                <input 
                                    type="text" 
                                    id="customerName" 
                                    class="input-field"
                                    placeholder="Jane Doe"
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="customerEmail">Customer Email</label>
                            <input 
                                type="email" 
                                id="customerEmail" 
                                class="input-field"
                                placeholder="jane@example.com"
                            >
                        </div>
                    </div>

                    <!-- Product Details -->
                    <div class="form-section">
                        <h3 class="section-title">Product Details</h3>
                        
                        <div class="form-group">
                            <label for="item">Item</label>
                            <select id="item" class="input-field" required>
                                <option value="">Select item</option>
                                <option value="Ankara Maxi Dress" data-price="120">Ankara Maxi Dress</option>
                                <option value="Kaftan" data-price="100">Kaftan</option>
                                <option value="Wrap Skirt" data-price="80">Wrap Skirt</option>
                                <option value="Custom Design" data-price="0">Custom Design</option>
                            </select>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="size">Size</label>
                                <select id="size" class="input-field" required>
                                    <option value="">Select size</option>
                                    <option value="S">Small (S)</option>
                                    <option value="M">Medium (M)</option>
                                    <option value="L">Large (L)</option>
                                    <option value="XL">Extra Large (XL)</option>
                                    <option value="XXL">XXL</option>
                                    <option value="Custom">Custom Size</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="color">Color</label>
                                <input 
                                    type="text" 
                                    id="color" 
                                    class="input-field"
                                    placeholder="Red"
                                >
                            </div>
                        </div>
                    </div>

                                    <!-- Pricing -->
                    <div class="form-section">
                        <h3 class="section-title">Pricing & Shipping</h3>
                        
                        <div class="form-group">
                            <label for="currency">Currency</label>
                            <select id="currency" class="input-field" required>
                                <option value="">Select currency</option>
                                <option value="NGN">Nigerian Naira (NGN)</option>
                                <option value="USD">US Dollar (USD)</option>
                                <option value="GBP">British Pound (GBP)</option>
                                <option value="EUR">Euro (EUR)</option>
                            </select>
                        </div>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="price">Price</label>
                                <input 
                                    type="number" 
                                    id="price" 
                                    class="input-field"
                                    placeholder="120.00"
                                    step="0.01"
                                    required
                                >
                            </div>
                        
                            <div class="form-group">
                                <label for="shipping">Shipping</label>
                                <input 
                                    type="number" 
                                    id="shipping" 
                                    class="input-field"
                                    placeholder="25.00"
                                    step="0.01"
                                    required
                                >
                            </div>
                        </div>
                    
                        <div class="form-group">
                            <label for="country">Shipping Country</label>
                            <input 
                                type="text" 
                                id="country" 
                                class="input-field"
                                placeholder="United States"
                                required
                            >
                        </div>
                    </div>

                    <!-- Additional Notes -->
                    <div class="form-section">
                        <h3 class="section-title">Additional Information</h3>
                        
                        <div class="form-group">
                            <label for="notes">Special Notes (Optional)</label>
                            <textarea 
                                id="notes" 
                                class="input-field textarea"
                                placeholder="Any customizations or special instructions"
                                rows="3"
                            ></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large">
                        Generate Checkout Link
                    </button>
                </form>

                <!-- Result Section -->
                <div id="resultSection" class="result-section hidden">
                    <div class="result-card">
                        <div class="success-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                        
                        <h3>Checkout Link Generated</h3>
                        <p class="result-subtitle">Share this link with your customer</p>

                        <div class="link-output">
                            <label>Encrypted Checkout URL</label>
                            <div class="link-display" id="checkoutLink"></div>
                            <div class="button-group">
                                <button class="btn btn-secondary" onclick="copyLink('checkoutLink')">
                                    Copy Link
                                </button>
                                <button class="btn btn-secondary" onclick="openPreview()">
                                    Preview
                                </button>
                            </div>
                        </div>

                        <button class="btn btn-outline" onclick="resetForm()">
                            Create Another Link
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="assets/js/builder.js"></script>
</body>
</html>
